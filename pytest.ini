[pytest]
# 用例根目录：从这里递归发现测试
testpaths = testcases

# 发现规则：文件 test_*.py、类 Test*、函数 test_*
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# -v 详细用例名；-ra 结尾汇总非通过原因（含 skip 理由，便于看 pending）
# --strict-markers 用了没注册的 marker 直接报错，防笔误
# --reruns/--reruns-delay 黑盒打真实网络，偶发抖动(超时/连接重置)自动重跑 1 次，
#   降低误报；仍稳定失败的才算真挂。行为确定的用例重跑结果一致，不会掩盖真 bug。
addopts = -v -ra --strict-markers --reruns 1 --reruns-delay 2

markers =
    smoke: 冒烟用例，核心链路（登录→建项目→建接口→执行用例→系统探活），CI 可 -m smoke 快速门禁
