get_project_detail_success:
  - case_id: get_project_detail_success
    request:
      name_prefix: auto_project_detail_
      description: API automation project detail
    expected:
      status_code: 200
      required_fields:
        - id
        - name
        - description
        - created_at

get_project_detail_fail:
  - case_id: project_not_exist
    request:
      project_id: 999999
    expected:
      status_code: 404

  - case_id: get_project_detail_without_token
    request:
      project_id: 999999
      headers: {}
    expected:
      status_code: 401
      detail: Not authenticated
