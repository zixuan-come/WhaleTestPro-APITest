create_success:
  - case_id: create_environment_success
    request:
      name_prefix: auto_env_create_
      base_url: http://localhost:8001
    expected:
      status_code: 201
      required_fields:
        - id
        - name
        - base_url

list_success:
  - case_id: list_environment_success
    expected:
      status_code: 200
      body_type: list

detail_success:
  - case_id: get_environment_success
    expected:
      status_code: 200
      required_fields:
        - id
        - name
        - base_url

detail_fail:
  - case_id: environment_not_exist
    request:
      env_id: 999999
    expected:
      status_code: 404

update_success:
  - case_id: update_environment_success
    request:
      name_prefix: auto_env_upd_
      base_url: http://localhost:8002
    expected:
      status_code: 200

delete_success:
  - case_id: delete_environment_success
    expected:
      status_code: 200

# 特征化：environment 创建不校验 token(疑似缺 Depends(get_current_user))
create_no_token:
  - case_id: create_environment_without_token
    request:
      name_prefix: auto_env_notoken_
      base_url: http://localhost:8001
    expected:
      status_code: 201
