create_success:
  - case_id: create_case_success
    request:
      name_prefix: auto_case_create_
      expected_status: 200
    expected:
      status_code: 201
      required_fields:
        - id
        - name
        - interface_id
        - expected_status

list_success:
  - case_id: list_case_success
    expected:
      status_code: 200
      body_type: list

detail_success:
  - case_id: get_case_success
    expected:
      status_code: 200
      required_fields:
        - id
        - name
        - interface_id

detail_fail:
  - case_id: case_not_exist
    request:
      case_id: 999999
    expected:
      status_code: 404

delete_success:
  - case_id: delete_case_success
    expected:
      status_code: 200

run_success:
  - case_id: run_case_success
    expected:
      status_code: 200
      required_fields:
        - passed
        - expected_status
        - actual_status
        - attempts

chain_success:
  - case_id: run_case_chain_success
    expected:
      status_code: 200
      body_type: list

create_fail:
  - case_id: create_case_wrong_type
    request:
      name_prefix: auto_case_badtype_
      interface_id: not-an-int
      expected_status: 200
    expected:
      status_code: 422

# 特征化：case 创建不校验 token(疑似缺 Depends(get_current_user))
create_no_token:
  - case_id: create_case_without_token
    request:
      name_prefix: auto_case_notoken_
      expected_status: 200
    expected:
      status_code: 201
